<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METEO-BENIN | #Meteo24Mai</title>
<style>
:root {
  --bg-main: #ffffff;
  --card-bg: #f8fafc;
  --card-border: #e2e8f0;
  --text-main: #0f172a;
  --text-muted: #475569;
  --primary: #008751;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background-color: var(--bg-main);
  color: var(--text-main);
  margin: 0; padding: 0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}
.app-container { width: 100%; max-width: 480px; padding: 16px; box-sizing: border-box; }
header {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; margin-bottom: 20px;
  border-bottom: 2px solid #e2e8f0; padding-bottom: 16px;
}
.logo-meteo { width: 85%; max-width: 320px; height: auto; object-fit: contain; }
.hashtag {
  background: var(--primary); color: white;
  padding: 4px 12px; border-radius: 6px;
  font-size: 0.9rem; font-weight: bold; letter-spacing: 0.5px;
}
.card {
  background: var(--card-bg); border-radius: 16px; padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  border: 1px solid var(--card-border);
}
.live-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
.live-geo { color: var(--text-muted); font-weight: 600; }
.update-time { background: #cbd5e1; padding: 2px 6px; border-radius: 4px; color: var(--text-main); font-size: 0.8rem; font-weight: 600; }
.temp-display { font-size: 3.5rem; font-weight: 800; margin: 10px 0; display: flex; align-items: center; justify-content: space-between; color: var(--text-main); }
.weather-desc { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
.weather-details { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; font-weight: 500; }
.user-clock { font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; text-align: right; font-style: italic; }
.status-badge { padding: 10px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 0.9rem; margin-top: 15px; text-transform: uppercase; }
.status-green  { background: rgba(16,185,129,0.15); color: #065f46; border: 1px solid rgba(16,185,129,0.3); }
.status-yellow { background: rgba(245,158,11,0.15); color: #92400e; border: 1px solid rgba(245,158,11,0.3); }
.status-orange { background: rgba(234,88,12,0.15);  color: #7c2d12; border: 1px solid rgba(234,88,12,0.3); }
.status-red    { background: rgba(239,68,68,0.15);  color: #991b1b; border: 1px solid rgba(239,68,68,0.3); }
h2 { font-size: 1rem; color: var(--text-main); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; font-weight: 700; }
.ticker-text {
  background: #f0fdf4; border-left: 4px solid var(--primary);
  padding: 12px; border-radius: 0 8px 8px 0;
  font-size: 0.9rem; line-height: 1.4; color: #166534; font-weight: 500;
  border-top: 1px solid #bbf7d0; border-right: 1px solid #bbf7d0; border-bottom: 1px solid #bbf7d0;
}
.day-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.tab-btn {
  flex: 1; background: #f1f5f9; border: 1px solid #e2e8f0;
  padding: 10px; border-radius: 8px; font-weight: 600;
  font-size: 0.85rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s ease;
}
.tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.forecast-day-content { display: none; max-height: 380px; overflow-y: auto; }
.forecast-day-content.active { display: block; }
.table-row { display: grid; grid-template-columns: 1fr 1fr 1.5fr; padding: 12px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; align-items: center; }
.table-row:last-child { border-bottom: none; }
.time { font-weight: 700; color: var(--text-main); }
.temp-col { font-weight: 600; text-align: center; color: var(--text-main); }
.desc-col { color: var(--text-muted); text-align: right; font-weight: 500; }
.empty-forecast { text-align: center; color: var(--text-muted); padding: 20px 0; font-style: italic; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="app-container">

  <header>
    <img src="logo.png" alt="ANM METEO-BENIN" class="logo-meteo">
    <span class="hashtag">#Meteo24Mai</span>
  </header>

  <div class="card">
    <div class="live-header">
      <span class="live-geo">📍 PALAIS DES CONGRÈS, COTONOU</span>
      <span class="update-time">MàJ: <strong id="last-update">--:--</strong></span>
    </div>
    <div class="temp-display">
      <span id="live-temp">--°C</span>
      <span id="live-icon">--</span>
    </div>
    <div class="weather-desc" id="live-desc">Chargement...</div>
    <div class="weather-details" id="live-details">Ressenti : -- | Vent : -- | Humidité : --</div>
    <div class="user-clock">Heure locale : <span id="current-clock">--:--</span></div>
    <div class="status-badge" id="status-badge">--</div>
  </div>

  <h2>Dernière Note Flash</h2>
  <div class="card">
    <div class="ticker-text" id="flash-note">Chargement...</div>
  </div>

  <h2>Prévisions de l'événement</h2>
  <div class="day-tabs">
    <button class="tab-btn active" id="btn-sat" onclick="switchDay('sat')">Samedi 23 mai</button>
    <button class="tab-btn" id="btn-sun" onclick="switchDay('sun')">Dimanche 24 mai</button>
  </div>
  <div class="card">
    <div id="day-sat" class="forecast-day-content active"><div class="empty-forecast">Chargement...</div></div>
    <div id="day-sun" class="forecast-day-content"><div class="empty-forecast">Chargement...</div></div>
  </div>

</div>
<script>
async function loadData() {
  try {
    const res  = await fetch(`Data.json?v=${Date.now()}`);
    const data = await res.json();

    document.getElementById('last-update').textContent = data.lastUpdate;
    document.getElementById('flash-note').innerHTML = `<strong>[${data.lastUpdate}]</strong> ${data.flashNote}`;
    document.getElementById('live-temp').textContent = `${data.live.temp}°C`;
    document.getElementById('live-icon').textContent = data.live.icon;
    document.getElementById('live-desc').textContent = data.live.desc;
    document.getElementById('live-details').textContent =
      `Ressenti : ${data.live.ressenti}°C | Vent : ${data.live.vent} | Humidité : ${data.live.humidite}%`;

    const badge = document.getElementById('status-badge');
    badge.textContent = data.live.statusText;
    badge.className   = `status-badge ${data.live.statusColor}`;

    renderDay('day-sat', data.samedi   || [], 23);
    renderDay('day-sun', data.dimanche || [], 24);
  } catch(e) {
    console.error("Erreur Data.json:", e);
  }
}

function renderDay(containerId, rows, targetDay) {
  if (!rows.length) {
    document.getElementById(containerId).innerHTML =
      '<div class="empty-forecast">Aucune prévision disponible.</div>';
    return;
  }

  const now         = new Date();
  const currentDay  = now.getDate();
  const currentHour = now.getHours();

  const filtered = rows.filter(r => {
    if (currentDay < targetDay)  return true;   // jour pas encore arrivé → tout afficher
    if (currentDay > targetDay)  return false;  // jour déjà passé → rien afficher
    return r.hour >= currentHour;               // jour en cours → heures à venir seulement
  });

  if (!filtered.length) {
    document.getElementById(containerId).innerHTML =
      '<div class="empty-forecast">Aucune prévision à venir pour cette journée.</div>';
    return;
  }

  document.getElementById(containerId).innerHTML = filtered.map(r => `
    <div class="table-row">
      <span class="time">${String(r.hour).padStart(2,'0')}:00</span>
      <span class="temp-col">${r.temp}°C ${r.icon}</span>
      <span class="desc-col">${r.desc}</span>
    </div>`).join('');
}

function switchDay(day) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.forecast-day-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`btn-${day === 'sat' ? 'sat' : 'sun'}`).classList.add('active');
  document.getElementById(`day-${day === 'sat' ? 'sat' : 'sun'}`).classList.add('active');
}

function startClock() {
  const el = document.getElementById('current-clock');
  const tick = () => {
    const now = new Date();
    el.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  };
  tick();
  setInterval(tick, 1000);
  setInterval(loadData, 60000);
}

window.onload = () => { loadData(); startClock(); };
</script>
</body>
</html>
