<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METEO-BENIN | Panel d'Administration #Meteo1erJuin</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background-color: #f8fafc;
  color: #1e293b;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.admin-container {
  width: 100%;
  max-width: 600px;
  background: #ffffff;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  border: 1px solid #e2e8f0;
}

header {
  text-align: center;
  margin-bottom: 25px;
  border-bottom: 2px solid #008751;
  padding-bottom: 15px;
}

h1 { font-size: 1.5rem; color: #0f172a; margin: 0; }

.subtitle { font-size: 0.9rem; color: #64748b; margin-top: 5px; }

.section-title {
  font-size: 1.1rem;
  color: #008751;
  margin: 20px 0 10px 0;
  padding-bottom: 5px;
  border-bottom: 1px solid #e2e8f0;
  text-transform: uppercase;
  font-weight: bold;
}

.form-group { margin-bottom: 15px; }

label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 5px;
  color: #334155;
}

input[type="text"], input[type="number"], textarea, select {
  width: 100%;
  padding: 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  box-sizing: border-box;
  font-size: 0.95rem;
  background-color: #f1f5f9;
  color: #1e293b;
  transition: all 0.2s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #008751;
  background-color: #ffffff;
  box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
}

.btn-submit {
  background-color: #008751;
  color: white;
  border: none;
  padding: 14px;
  width: 100%;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 20px;
  box-shadow: 0 4px 6px rgba(0, 135, 81, 0.2);
}

.btn-submit:hover { background-color: #00663d; }

.status-message {
  padding: 12px;
  border-radius: 8px;
  margin-top: 15px;
  font-size: 0.9rem;
  text-align: center;
  display: none;
}

.status-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
.status-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

.btn-reset-token {
  background: none;
  border: none;
  color: #ef4444;
  font-size: 0.8rem;
  cursor: pointer;
  text-decoration: underline;
  float: right;
  margin-top: 5px;
}

.forecast-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  margin-top: 10px;
}

.forecast-table th {
  background: #f1f5f9;
  padding: 8px;
  text-align: left;
  font-weight: 700;
  color: #334155;
  border-bottom: 2px solid #e2e8f0;
}

.forecast-table td {
  padding: 6px 4px;
  border-bottom: 1px solid #e2e8f0;
  vertical-align: middle;
}

.forecast-table td:first-child {
  font-weight: 700;
  color: #008751;
  white-space: nowrap;
}

.forecast-table input[type="number"] { width: 60px; padding: 6px; font-size: 0.85rem; }
.forecast-table input[type="text"] { width: 100%; padding: 6px; font-size: 0.82rem; }
.forecast-table select { padding: 5px; font-size: 0.85rem; }
</style>
<script src="config.js"></script>
</head>
<body>
<div class="admin-container">

  <header>
    <h1>METEO-BENIN</h1>
    <div class="subtitle">Console de Prévision en Direct — #Meteo1erJuin — Toribosito, Atlantique</div>
  </header>

  <div id="status-box" class="status-message"></div>

  <form id="meta-form" onsubmit="publishUpdate(event)">

    <div class="section-title">🕒 Conditions en Direct (Toribosito)</div>

    <div class="form-group">
      <label for="live-temp">Température Actuelle (°C)</label>
      <input type="number" id="live-temp" required>
    </div>

    <div class="form-group">
      <label for="live-icon">Icône Météo (Émoji)</label>
      <select id="live-icon">
        <option value="☀️">☀️ Ensoleillé / Ciel Clair</option>
        <option value="⛅">⛅ Éclaircies / Partiellement Nuageux</option>
        <option value="☁️">☁️ Nuageux / Couvert</option>
        <option value="🌧️">🌧️ Pluie Légère / Averses</option>
        <option value="⛈️">⛈️ Orageux / Risque de foudre</option>
        <option value="🌌">🌌 Nuit Calme / Ciel Étoilé</option>
        <option value="🌅">🌅 Aube / Lever de Soleil</option>
      </select>
    </div>

    <div class="form-group">
      <label for="live-desc">Description du Temps</label>
      <input type="text" id="live-desc" required>
    </div>

    <div class="form-group">
      <label for="live-ressenti">Température Ressentie (°C)</label>
      <input type="number" id="live-ressenti" required>
    </div>

    <div class="form-group">
      <label for="live-vent">Force & Direction du Vent</label>
      <input type="text" id="live-vent" placeholder="Ex: SW 15 km/h" required>
    </div>

    <div class="form-group">
      <label for="live-humidite">Humidité (%)</label>
      <input type="number" id="live-humidite" min="0" max="100" required>
    </div>

    <div class="section-title">⚠️ Niveau d'Alerte & Vigilance</div>

    <div class="form-group">
      <label for="live-status">Statut de Vigilance</label>
      <select id="live-status">
        <option value="status-green|🟢 Conditions Optimales">Vert — Conditions Optimales</option>
        <option value="status-yellow|🟡 Vigilance Jaune">Jaune — Attention Particulière</option>
        <option value="status-red|🔴 Alerte Météo">Rouge — Danger / Perturbations</option>
      </select>
    </div>

    <div class="section-title">📅 Prévisions — Lundi 1er juin (toutes les 3h)</div>

    <table class="forecast-table">
      <thead>
        <tr>
          <th>Heure</th>
          <th>Temp (°C)</th>
          <th>Icône</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="tbody-lundi"></tbody>
    </table>

    <div class="section-title">📢 Note Flash du Prévisionniste</div>

    <div class="form-group">
      <label for="flash-note">Message d'information en direct</label>
      <textarea id="flash-note" rows="3" required></textarea>
    </div>

    <button type="submit" class="btn-submit">🚀 Publier les Modifications</button>
  </form>

  <button class="btn-reset-token" onclick="resetToken()">Changer la clé GitHub Token</button>
</div>

<script>
let currentData = null;
const ICON_OPTIONS = ['☀️','⛅','☁️','🌧️','⛈️','🌌','🌅'];

function checkToken() {
  if (!CONFIG.GITHUB_TOKEN) {
    let savedToken = localStorage.getItem('mon_token_github');
    if (!savedToken) {
      savedToken = prompt("Clé de sécurité requise (Entrez votre GitHub Token) :");
      if (savedToken) {
        localStorage.setItem('mon_token_github', savedToken);
        CONFIG.GITHUB_TOKEN = savedToken;
      } else {
        showStatus("Erreur : Impossible de travailler sans jeton de sécurité.", "error");
      }
    } else {
      CONFIG.GITHUB_TOKEN = savedToken;
    }
  }
}

function resetToken() {
  localStorage.removeItem('mon_token_github');
  alert("Clé supprimée. Le panneau va se recharger.");
  window.location.reload();
}

function buildForecastRows(tbodyId, forecasts) {
  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = '';
  forecasts.forEach((f, idx) => {
    const iconOptions = ICON_OPTIONS.map(ic =>
      `<option value="${ic}" ${ic === f.icon ? 'selected' : ''}>${ic}</option>`
    ).join('');
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${String(f.hour).padStart(2,'0')}:00</td>
      <td><input type="number" data-idx="${idx}" data-field="temp" value="${f.temp}" min="15" max="45"></td>
      <td><select data-idx="${idx}" data-field="icon">${iconOptions}</select></td>
      <td><input type="text" data-idx="${idx}" data-field="desc" value="${f.desc}"></td>
    `;
    tbody.appendChild(row);
  });
}

function collectForecastData(tbodyId, originalArray) {
  const rows = document.querySelectorAll(`#${tbodyId} tr`);
  return Array.from(rows).map((row, idx) => ({
    hour: originalArray[idx].hour,
    temp: parseInt(row.querySelector('[data-field="temp"]').value),
    icon: row.querySelector('[data-field="icon"]').value,
    desc: row.querySelector('[data-field="desc"]').value
  }));
}

async function fetchCurrentData() {
  checkToken();
  try {
    const res = await fetch(`Data.json?v=${new Date().getTime()}`);
    currentData = await res.json();

    document.getElementById('live-temp').value = currentData.live.temp;
    document.getElementById('live-icon').value = currentData.live.icon;
    document.getElementById('live-desc').value = currentData.live.desc;
    document.getElementById('live-ressenti').value = currentData.live.ressenti;
    document.getElementById('live-vent').value = currentData.live.vent;
    document.getElementById('live-humidite').value = currentData.live.humidite;
    document.getElementById('flash-note').value = currentData.flashNote;

    document.getElementById('live-status').value = `${currentData.live.statusColor}|${currentData.live.statusText}`;

    buildForecastRows('tbody-lundi', currentData.lundi);

  } catch (err) {
    showStatus("Erreur lors de la récupération des données.", "error");
  }
}

function showStatus(text, type) {
  const box = document.getElementById('status-box');
  box.textContent = text;
  box.className = `status-message status-${type}`;
  box.style.display = 'block';
  window.scrollTo(0, 0);
}

async function publishUpdate(e) {
  e.preventDefault();
  checkToken();
  showStatus("Connexion à l'API GitHub et téléversement en cours...", "success");

  const now = new Date();
  const lastUpdateStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  const statusParts = document.getElementById('live-status').value.split('|');

  currentData.lastUpdate = lastUpdateStr;
  currentData.flashNote = document.getElementById('flash-note').value;
  currentData.live = {
    temp: parseInt(document.getElementById('live-temp').value),
    icon: document.getElementById('live-icon').value,
    desc: document.getElementById('live-desc').value,
    ressenti: parseInt(document.getElementById('live-ressenti').value),
    vent: document.getElementById('live-vent').value,
    humidite: parseInt(document.getElementById('live-humidite').value),
    statusText: statusParts[1],
    statusColor: statusParts[0]
  };

  currentData.lundi = collectForecastData('tbody-lundi', currentData.lundi);

  const url = `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${CONFIG.FILE_PATH}`;

  try {
    const fileCheck = await fetch(url, {
      headers: { "Authorization": `token ${CONFIG.GITHUB_TOKEN}` }
    });
    if (!fileCheck.ok) throw new Error("Accès refusé. Vérifiez que votre jeton a bien la case 'repo' cochée.");
    const fileData = await fileCheck.json();
    const sha = fileData.sha;

    const updateRes = await fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": `token ${CONFIG.GITHUB_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: `Mise à jour météo officielle [${lastUpdateStr}] — #Meteo1erJuin`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 4)))),
        sha: sha
      })
    });

    if (updateRes.ok) {
      showStatus(`☀️ Succès ! Modifications publiées à ${lastUpdateStr}. Le site public s'actualise dans quelques secondes...`, "success");
    } else {
      const errJson = await updateRes.json();
      showStatus(`Échec du téléversement : ${errJson.message}`, "error");
    }
  } catch (error) {
    showStatus(`Erreur de communication : ${error.message}`, "error");
  }
}

window.onload = fetchCurrentData;
</script>
</body>
</html>
